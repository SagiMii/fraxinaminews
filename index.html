<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  
  <!-- Viewport correcto -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Test App Normal</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100dvh; /* IMPORTANTE */
      background: #0f172a;
      color: white;
      overflow: auto; /* NO bloquear scroll */
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      z-index: 10;
    }

    main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      margin-bottom: 15px;
      padding: 20px;
      border-radius: 12px;
    }

    footer {
      position: sticky;
      bottom: 0;
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 14px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    🔝 Barra superior (simulación)
  </header>

  <main>
    <div class="card">
      <h2>Prueba normal</h2>
      <p>Si ves esto con la barra del celular visible, FUNCIONA ✅</p>
    </div>

    <div class="card">
      <p>Haz scroll para comprobar que no se ocultan cosas raras.</p>
    </div>

    <!-- Contenido extra para forzar scroll -->
    <div class="card">Contenido extra 1</div>
    <div class="card">Contenido extra 2</div>
    <div class="card">Contenido extra 3</div>
    <div class="card">Contenido extra 4</div>
    <div class="card">Contenido extra 5</div>

    <button onclick="alert('Funciona bien 😎')">
      Probar botón
    </button>
  </main>

  <footer>
    🔽 Barra inferior (simulación)
  </footer>

</body>
</html>
