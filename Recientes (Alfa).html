            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 250px; /* Relación de aspecto 16:9 */
            overflow: hidden;
            margin-bottom: 20px;

        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
            width: 100%;
            height: 100%;
        }
        .slide {
            min-width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .slide a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }
        .slide-title {
            position: absolute;
            bottom: 0;
            left: 0;
            color: white;
            padding: 4px 8px;
            background: transparent; /* Fondo transparente */
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            text-shadow: 
                0 0 10px rgba(0, 0, 0, 1),   /* Brillo negro más intenso */

                0 0 30px rgba(0, 0, 0, 1),   /* Brillo negro aún más extendido */
                0 0 40px rgba(0, 0, 0, 1),   /* Brillo negro máximo */
                0 0 5px rgba(0, 0, 0, 1);    /* Borde negro más grueso */
            text-align: left; /* Alineación a la izquierda */
        }
        .prev, .next {

    cursor: pointer;

    position: absolute;

    top: 50%;

    width: auto;

    padding: 10px; /* Ajusta el tamaño del padding */

    font-size: 27px; /* Ajusta el tamaño del ícono */

    color: white;

    background-color: transparent; /* Fondo transparente */

    border: none; /* Sin borde */

    text-shadow: 0 0 5px black; /* Crea un borde alrededor del texto con sombra negra */

    z-index: 10;

    transform: translateY(-50%); /* Centra verticalmente */

    transition: color 0.3s ease; /* Suaviza la transición del color */

}

.prev:hover, .next:hover {

    color: black; /* Color de la flecha al pasar el ratón */

}

.next {

    right: 0px; /* Ajusta la posición horizontal */

}

.prev {

    left: 0px; /* Ajusta la posición horizontal */

}
        .recommendations {
            margin-top: 20px;
        }
        .recommendations h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .recommendations-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 0 20px;
            justify-items: center;
        }
        .recommendation {
            background-color: white;

.recommendation img {
    aspect-ratio: 16 / 9;

    object-fit: cover;

    image-rendering: optimizeQuality; /* Para navegadores que lo soporten */
    backface-visibility: hidden;   /* Suaviza en algunos casos */
    transform: translateZ(0);      /* Mejora en algunos motores de renderizado */
}

        .card-content {

.episode-label {
    position: absolute;
    top: 4px; /* Espacio desde el borde superior */
    right: 4px; /* Espacio desde el borde derecho */
    background: white; /* Fondo blanco */
    color: black; /* Texto negro */
    padding: 2px 8px; /* Padding menor en la parte superior e inferior */

    justify-content: center; /* Centra horizontalmente el texto */
    line-height: 1.2; /* Ajusta la altura de línea para reducir el espacio vertical */
    height: auto; /* Ajusta la altura automáticamente según el contenido */
    white-space: nowrap; /* Evita que el texto se divida en varias líneas */
    border: 1px solid black; /* Borde negro fino alrededor del fondo */
}

    .episode-label {

        let currentSlide = 0;
let slideInterval;

// Función para mostrar el slide actual
function showSlides() {
    const slides = document.getElementById('slides');
    slides.style.transform = `translateX(-${currentSlide * 100}%)`;
}

// Función para avanzar manualmente
function plusSlides(n) {
    currentSlide += n;
    const totalSlides = document.querySelectorAll('.slide').length;
    if (currentSlide >= totalSlides) {
        currentSlide = 0;
    } else if (currentSlide < 0) {
        currentSlide = totalSlides - 1;
    }
    showSlides();
    resetSlideInterval(); // Reinicia el contador automático
}

// Función para reiniciar el intervalo automático
function resetSlideInterval() {
    clearInterval(slideInterval);
    slideInterval = setInterval(() => {
        plusSlides(1);

}
